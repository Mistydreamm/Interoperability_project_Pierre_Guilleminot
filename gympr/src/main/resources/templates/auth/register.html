<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — GymPR</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0a; --surface: #131313; --surface-2: #1c1c1c;
            --border: #2a2a2a; --accent: #dc2626; --accent-hover: #b91c1c;
            --accent-glow: rgba(220,38,38,0.2); --text: #f5f5f5;
            --text-muted: #a1a1aa; --danger: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; border-top: 3px solid var(--accent); }
        .brand { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 0.15rem; text-transform: uppercase; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .form-group { margin-bottom: 1.1rem; }
        .form-label { display: block; font-size: 0.72rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
        .form-control { width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 0.75rem; border-radius: 4px; font-size: 0.95rem; transition: border-color 0.15s; font-weight: 500; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .form-control::placeholder { color: var(--text-muted); }
        .btn-submit { display: block; width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 0.95rem; font-weight: 900; cursor: pointer; margin-top: 1.5rem; letter-spacing: 2px; text-transform: uppercase; transition: background 0.15s; }
        .btn-submit:hover { background: var(--accent-hover); }
        .alert-danger { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: 0.875rem; background: rgba(239,68,68,0.1); border-left: 3px solid var(--danger); color: var(--danger); }
        .field-error { color: var(--danger); font-size: 0.78rem; margin-top: 0.25rem; }
        .footer-link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--text-muted); }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="brand">Create account</div>
    <div class="subtitle">Start logging your PRs today.</div>

    <div th:if="${errorMessage}" class="alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input id="username" class="form-control" type="text" th:field="*{username}" placeholder="your_handle" autocomplete="username">
            <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input id="email" class="form-control" type="email" th:field="*{email}" placeholder="you@example.com" autocomplete="email">
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-control" type="password" th:field="*{password}" placeholder="min. 6 characters" autocomplete="new-password">
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="footer-link">Already have an account? <a th:href="@{/auth/login}">Sign in</a></div>
</div>
</body>
</html>
