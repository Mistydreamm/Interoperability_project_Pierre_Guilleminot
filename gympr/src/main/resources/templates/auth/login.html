<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GymPR</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0a; --surface: #131313; --surface-2: #1c1c1c;
            --border: #2a2a2a; --accent: #dc2626; --accent-hover: #b91c1c;
            --accent-glow: rgba(220,38,38,0.2); --text: #f5f5f5;
            --text-muted: #a1a1aa; --success: #22c55e; --danger: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; border-top: 3px solid var(--accent); }
        .brand { font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-bottom: 0.15rem; text-transform: uppercase; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .form-group { margin-bottom: 1.1rem; }
        .form-label { display: block; font-size: 0.72rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
        .form-control { width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 0.75rem; border-radius: 4px; font-size: 0.95rem; transition: border-color 0.15s; font-weight: 500; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .btn-submit { display: block; width: 100%; padding: 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 0.95rem; font-weight: 900; cursor: pointer; margin-top: 1.5rem; letter-spacing: 2px; text-transform: uppercase; transition: background 0.15s; }
        .btn-submit:hover { background: var(--accent-hover); }
        .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: 0.875rem; }
        .alert-danger  { background: rgba(239,68,68,0.1); border-left: 3px solid var(--danger); color: var(--danger); }
        .alert-success { background: rgba(34,197,94,0.08); border-left: 3px solid var(--success); color: var(--success); }
        .footer-link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--text-muted); }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="brand">GymPR</div>
    <div class="subtitle">Track the lift. Earn the PR.</div>

    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input id="username" class="form-control" type="text" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-control" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="footer-link">No account? <a th:href="@{/auth/register}">Register</a></div>
</div>
</body>
</html>
