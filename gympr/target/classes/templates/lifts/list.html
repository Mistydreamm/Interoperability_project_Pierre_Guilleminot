<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR Log — GymPR</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0a; --surface: #131313; --surface-2: #1c1c1c;
            --border: #2a2a2a; --accent: #dc2626; --accent-hover: #b91c1c;
            --text: #f5f5f5; --text-muted: #a1a1aa;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --gold: #fbbf24;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; }

        .navbar { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .navbar-nav { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .navbar-nav a { color: var(--text-muted); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .navbar-nav a:hover { color: var(--text); }
        .user-badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 0.2rem 0.7rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

        .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 1rem; border-radius: 4px; border: 1px solid transparent; font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: all 0.15s; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); color: #fff; }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface-2); color: var(--text); }
        .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.7rem; }
        .btn-danger-sm { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 4px; padding: 0.3rem 0.65rem; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-danger-sm:hover { background: var(--danger); color: #fff; }

        .main { max-width: 1150px; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .page-title { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; }
        .sg { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 140px; }
        .sg label { font-size: 0.68rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .form-control, .form-select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.7rem; border-radius: 4px; font-size: 0.875rem; appearance: none; width: 100%; font-weight: 500; }
        .form-control:focus, .form-select:focus { outline: none; border-color: var(--accent); }
        .form-control::placeholder { color: var(--text-muted); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; transition: all 0.15s; position: relative; overflow: hidden; }
        .card.milestone { border-left: 4px solid var(--gold); }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .milestone-tag { position: absolute; top: 0; right: 0; background: var(--gold); color: #0a0a0a; font-size: 0.65rem; font-weight: 900; padding: 0.2rem 0.6rem; text-transform: uppercase; letter-spacing: 1px; border-bottom-left-radius: 4px; }

        .card-header { display: flex; flex-direction: column; gap: 0.25rem; }
        .lift-name { font-weight: 900; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .lift-name a { color: var(--text); }
        .lift-name a:hover { color: var(--accent); }

        .weight-display { font-size: 2.4rem; font-weight: 900; color: var(--accent); line-height: 1; letter-spacing: -1px; font-feature-settings: "tnum"; }
        .weight-unit { font-size: 1rem; color: var(--text-muted); font-weight: 700; margin-left: 0.3rem; }
        .reps-line { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .reps-line strong { color: var(--text); font-weight: 800; }

        .badges-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 3px; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; }
        .badge-group { background: rgba(220,38,38,0.12); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
        .badge-lift  { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }

        .rpe-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; }
        .rpe-dots { display: flex; gap: 2px; }
        .rpe-dot { width: 7px; height: 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 1px; }
        .rpe-dot.filled { background: var(--accent); border-color: var(--accent); }
        .rpe-dot.max    { background: var(--gold); border-color: var(--gold); }

        .meta-line { font-size: 0.78rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; padding-top: 0.5rem; border-top: 1px solid var(--border); }

        .card-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-state h3 { color: var(--text); font-size: 1.1rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .alert-success { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: 0.875rem; background: rgba(34,197,94,0.08); border-left: 3px solid var(--success); color: var(--success); font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/lifts}">GymPR</a>
    <ul class="navbar-nav">
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/lifts/new}">+ New PR</a></li>
        <li><a href="/swagger-ui.html" target="_blank">API Docs</a></li>
        <li><span class="user-badge" sec:authentication="name">user</span></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline btn-sm">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<div class="main">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="page-header">
        <h1 class="page-title">PR Log</h1>
        <span class="user-badge" th:text="${records.size()} + ' records'"></span>
    </div>

    <form class="search-bar" th:action="@{/lifts}" method="get">
        <div class="sg" style="flex:2; min-width:180px;">
            <label>Gym / Equipment</label>
            <input class="form-control" type="text" name="query" th:value="${query}" placeholder="e.g. Fit Fabrika, straps...">
        </div>
        <div class="sg">
            <label>Lift</label>
            <select class="form-select" name="lift">
                <option value="">All lifts</option>
                <option th:each="l : ${liftTypes}" th:value="${l}"
                        th:text="${#strings.replace(l.name(),'_',' ')}"
                        th:selected="${selectedLift == l}"></option>
            </select>
        </div>
        <div class="sg">
            <label>Group</label>
            <select class="form-select" name="group">
                <option value="">All groups</option>
                <option th:each="g : ${muscleGroups}" th:value="${g}"
                        th:text="${#strings.replace(g.name(),'_',' ')}"
                        th:selected="${selectedGroup == g}"></option>
            </select>
        </div>
        <div class="sg">
            <label>Milestones</label>
            <select class="form-select" name="milestone">
                <option value="">All</option>
                <option value="true" th:selected="${selectedMilestone != null and selectedMilestone}">Milestones only</option>
                <option value="false" th:selected="${selectedMilestone != null and !selectedMilestone}">Regular PRs</option>
            </select>
        </div>
        <div style="display:flex; gap:0.5rem; align-items:flex-end;">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/lifts}" class="btn btn-outline">Clear</a>
        </div>
    </form>

    <div th:if="${records.isEmpty()}" class="empty-state">
        <h3>No PRs recorded</h3>
        <p>Log your first PR to start tracking progress.</p>
    </div>

    <div class="grid" th:unless="${records.isEmpty()}">
        <div class="card" th:each="r : ${records}" th:classappend="${r.milestone} ? 'milestone'">
            <span class="milestone-tag" th:if="${r.milestone}">MILESTONE</span>

            <div class="card-header">
                <div class="lift-name">
                    <a th:href="@{/lifts/{id}(id=${r.id})}"
                       th:text="${#strings.replace(r.liftType.name(),'_',' ')}"></a>
                </div>
            </div>

            <div>
                <span class="weight-display" th:text="${r.weightKg}"></span><span class="weight-unit">KG</span>
                <div class="reps-line">
                    <strong th:text="${r.sets != null ? r.sets + ' × ' + r.reps : r.reps}"></strong>
                    <span th:text="${r.reps == 1 ? ' rep' : ' reps'}"></span>
                </div>
            </div>

            <div class="rpe-bar" th:if="${r.rpe != null}">
                <span th:text="'RPE ' + ${r.rpe}"></span>
                <div class="rpe-dots">
                    <div class="rpe-dot" th:each="i : ${#numbers.sequence(1,10)}"
                         th:classappend="${i <= r.rpe ? (r.rpe == 10 ? 'max' : 'filled') : ''}"></div>
                </div>
            </div>

            <div class="badges-row">
                <span class="badge badge-group" th:text="${#strings.replace(r.muscleGroup.name(),'_',' ')}"></span>
                <span class="badge badge-lift" th:if="${r.bodyweightKg != null}"
                      th:text="'BW ' + ${r.bodyweightKg} + 'kg'"></span>
            </div>

            <div class="meta-line">
                <span th:if="${r.liftDate != null}" th:text="${#temporals.format(r.liftDate, 'dd. MM. yyyy.')}"></span>
                <span th:if="${r.gymLocation != null and !r.gymLocation.isBlank()}" th:text="${r.gymLocation}"></span>
            </div>

            <div class="card-actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/lifts/edit/{id}(id=${r.id})}" class="btn btn-outline btn-sm">Edit</a>
                <form th:action="@{/lifts/delete/{id}(id=${r.id})}" method="post"
                      onsubmit="return confirm('Remove this PR?')">
                    <button type="submit" class="btn-danger-sm">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
